info:
  title: Yivi Business Wallet API
  description: |
    HTTP API for the Yivi Business Wallet backend. All endpoints live under the
    versioned `/api/v1` prefix. Authentication uses the `ybw_session` cookie set
    by the login flow; endpoints that do not require it are marked with no security.
  version: "1.0.0"
servers:
  - url: /api/v1
    description: Versioned API root
tags:
