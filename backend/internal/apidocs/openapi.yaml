      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Organisation slug.
    get:
      tags: [issuer-settings]
      summary: Get the organisation issuer settings
      description: Requires an administrator role in the organisation.
      responses:
        '2XX':
          description: Successful response.
          content:
            application/json:
              schema:
                description: Response payload; shape depends on the endpoint.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [issuer-settings]
      summary: Update the organisation issuer settings
      description: >-
        Requires an administrator role in the organisation. Sent as
        multipart/form-data: string fields instanceName, displayName and enabled
        ("true"/"false"), an optional logo image file that replaces the logo, and
        removeLogo=true to clear it. Omitting both leaves the existing logo
        untouched.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                instanceName:
                  type: string
                  description: Lowercase slug the org's offers route to.
                displayName:
                  type: string
                  description: Issuer display name shown in wallets.
                enabled:
                  type: string
                  description: Set to "true" to route this org's offers to its own instance.
                logo:
                  type: string
                  format: binary
                  description: Logo image (PNG, JPEG, GIF, WebP or SVG) that replaces the current logo.
                removeLogo:
                  type: string
                  description: Set to "true" to clear the stored logo.
      responses:
        '2XX':
          description: Successful response.
          content:
            application/json:
              schema:
                description: Response payload; shape depends on the endpoint.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: The uploaded logo is too large.
