      tags: [theme]
      summary: Update the organisation theme
      description: >-
        Requires an administrator role in the organisation. Sent as
        multipart/form-data: string fields primaryColor and accentColor, an
        optional logo image file that replaces the logo, and removeLogo=true to
        clear it. Omitting both leaves the existing logo untouched.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                primaryColor:
                  type: string
                  description: Primary colour as a 6-digit hex string; empty clears it.
                accentColor:
                  type: string
                  description: Accent colour as a 6-digit hex string; empty clears it.
                logo:
                  type: string
                  format: binary
                  description: Logo image (PNG, JPEG, GIF, WebP or SVG) that replaces the current logo.
                removeLogo:
                  type: string
                  description: Set to "true" to clear the stored logo.
      responses:
        '2XX':
          description: Successful response.
          content:
            application/json:
              schema:
