    description: Login sessions and the current user.
  - name: wallet
    description: Organisation registration and the organisation wallet.
  - name: organizations
    description: Organisations, members, invitations and departments.
  - name: attestation
    description: Attestation schemas, templates, keys and issuance.
  - name: qerds
    description: Qualified electronic registered delivery service messaging.
  - name: postguard
    description: PostGuard attribute-based encryption settings and files.
  - name: email
    description: Per-organisation email settings.
  - name: issuer-settings
    description: Per-organisation issuer settings.
  - name: wsca
    description: Per-organisation WSCA holder-wallet activation and rotation.
  - name: theme
    description: Per-organisation colour scheme and logo.
