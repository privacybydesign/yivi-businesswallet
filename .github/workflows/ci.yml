name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Check formatting
        run: go tool golangci-lint fmt --diff
      - run: go tool golangci-lint run ./...

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go test -race ./...

  backend-integration-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go test -tags=integration -race ./...
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

  # WSCA is opt-in and its client (walletmobile) is a private module, so the
  # default build above pulls in nothing private. This job is the only one that
  # needs the deploy key: it clones the wallet-provider and builds/tests the
  # `wsca`-tagged path through a Go workspace, so the WSCA code stays compiling.
  backend-build-wsca:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Clone the private wallet-provider module
        env:
          DEPLOY_KEY: ${{ secrets.WALLET_PROVIDER_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@github.com:privacybydesign/wallet-provider.git "$GITHUB_WORKSPACE/wallet-provider"
          git -C "$GITHUB_WORKSPACE/wallet-provider" checkout 3f463ccc34aa617ce668cc2158de6e75b1e4967c
      - name: Create Go workspace (main module + wallet-provider clone)
        run: |
          GO_VERSION="$(go mod edit -json | python3 -c 'import json,sys;print(json.load(sys.stdin)["Go"])')"
          {
            echo "go ${GO_VERSION}"
            echo
            echo "use ."
            echo
            echo "use ../wallet-provider"
          } > go.work
      - run: go build -tags wsca ./...
      - run: go test -tags wsca -race ./internal/eudiholder/ ./internal/wscawallet/
