services:
  db:
    ports:
      - "5432:5432"

  backend:
    build:
      dockerfile: docker/development/Dockerfile
    healthcheck:
      start_period: 180s
      start_interval: 2s
    environment:
      # Ignore any host go.work (bind-mounted via ./backend): WSCA is opt-in and
      # its private module is only pulled in by a -tags wsca workspace build,
      # which the default dev container never does. See .ai/features/wsca-holder-binding.md.
      GOWORK: "off"
      # Login/disclosure runs over OpenID4VP against a hosted EUDI verifier.
      # Empty falls back to the config default (Yivi staging verifier).
      EUDI_VERIFIER_URL: ${EUDI_VERIFIER_URL:-}
      EUDI_ISSUER_CHAIN: ${EUDI_ISSUER_CHAIN:-}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-admin@yivi.app}
      # Claim links in dev point at the local frontend.
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      # Attestation issuer: stub by default. Set ATTESTATION_ISSUER=veramo (+ token)
      # in .env to issue against the hosted Veramo staging issuer.
      ATTESTATION_ISSUER: ${ATTESTATION_ISSUER:-stub}
      ATTESTATION_ISSUER_URL: ${ATTESTATION_ISSUER_URL:-https://veramo-issuer.openid4vc.staging.yivi.app}
      ATTESTATION_ISSUER_INSTANCE: ${ATTESTATION_ISSUER_INSTANCE:-test-issuer}
      ATTESTATION_ISSUER_ADMIN_TOKEN: ${ATTESTATION_ISSUER_ADMIN_TOKEN:-}
      ATTESTATION_ISSUER_PING_CREDENTIAL: ${ATTESTATION_ISSUER_PING_CREDENTIAL:-}
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY:-}
      # Holder wallet: stub by default. Set ATTESTATION_HOLDER=irmago (+ master key)
      # in .env to actually hold received credentials in the irmago EUDI engine.
      ATTESTATION_HOLDER: ${ATTESTATION_HOLDER:-stub}
      ATTESTATION_HOLDER_STORAGE_DIR: ${ATTESTATION_HOLDER_STORAGE_DIR:-/tmp/eudiholder}
      ATTESTATION_HOLDER_MASTER_KEY: ${ATTESTATION_HOLDER_MASTER_KEY:-}
      ATTESTATION_HOLDER_TRUST_CHAIN: ${ATTESTATION_HOLDER_TRUST_CHAIN:-}
      ATTESTATION_HOLDER_STAGING_ANCHORS: ${ATTESTATION_HOLDER_STAGING_ANCHORS:-}
      ATTESTATION_HOLDER_ALLOW_INSECURE_HTTP: ${ATTESTATION_HOLDER_ALLOW_INSECURE_HTTP:-}
      # WSCA-backed holder binding (opt-in): set ATTESTATION_HOLDER_WSCA_URL to the
      # wallet-provider. Requires ATTESTATION_HOLDER_WSCA_KEK. See
      # .ai/features/wsca-holder-binding.md.
      ATTESTATION_HOLDER_WSCA_URL: ${ATTESTATION_HOLDER_WSCA_URL:-}
      ATTESTATION_HOLDER_WSCA_KEK: ${ATTESTATION_HOLDER_WSCA_KEK:-}
      ATTESTATION_HOLDER_WSCA_KEYSTORE_DIR: ${ATTESTATION_HOLDER_WSCA_KEYSTORE_DIR:-/tmp/eudiholder-wsca}
      ATTESTATION_HOLDER_WSCA_INSECURE: ${ATTESTATION_HOLDER_WSCA_INSECURE:-}
    depends_on:
      seed:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod

  migrate:
    build:
      dockerfile: docker/development/Dockerfile
    entrypoint: [ "go", "run", "./cmd/migrate"]
    environment:
      # Ignore any host go.work bind-mounted via ./backend (see backend service).
      GOWORK: "off"
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod

  seed:
    build:
      context: backend
      dockerfile: docker/development/Dockerfile
    entrypoint: ["go", "run", "./cmd/seed"]
    environment:
      # Ignore any host go.work bind-mounted via ./backend (see backend service).
      GOWORK: "off"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-yivi_business_wallet}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod

  # Dev SMTP catch-all: Mailpit (a maintained MailHog) captures all outbound mail
  # so credential-offer notifications are viewable without a real mail server.
  # Web UI: http://localhost:8025 . Per-org SMTP settings in dev point at
  # host "mailpit", port 1025 (no auth) — the seeder configures the demo org.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  frontend:
    build:
      context: frontend
      dockerfile: src/docker/development/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # QERDS transport bench (AS4 / eDelivery). Opt-in — heavy and only needed when
  # exercising the real `domibus` provider driver instead of the in-process stub:
  #   docker compose --profile domibus up
  # then run the backend with QERDS_PROVIDER=domibus and
  # QERDS_PROVIDER_URL=http://domibus:8080/domibus/services/backend.
  # Admin console: http://localhost:8090/domibus (admin / 123456).
  # NOTE: proves AS4 plumbing, not qualified compliance — see .ai/features/qerds.md.
  domibus-mysql:
    image: fiware/domibus-mysql:latest
    # Published only for linux/amd64; runs under emulation on arm64 hosts.
    platform: linux/amd64
    profiles: ["domibus"]
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: domibus
      MYSQL_USER: edelivery
      MYSQL_PASSWORD: edelivery
    # First-run MySQL init is slow (slower still under amd64 emulation on arm64),
    # so gate readiness on a real ping before starting Domibus.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    networks:
      # The Domibus Tomcat image resolves its datasource host as "mysql".
      default:
        aliases:
          - mysql

  domibus:
    image: fiware/domibus-tomcat:latest
    platform: linux/amd64
    profiles: ["domibus"]
    environment:
      # The image requires exactly "MySQL" or "Oracle" (case-sensitive).
      DB_TYPE: MySQL
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: domibus
      DB_USER: edelivery
      DB_PASS: edelivery
    ports:
      - "8090:8080"
    depends_on:
      domibus-mysql:
        condition: service_healthy

volumes:
  backend-go-build:
  backend-go-mod:
  frontend-node-modules:
