services:
  backend:
    build:
      dockerfile: docker/development/Dockerfile
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  frontend:
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  backend-go-build:
  backend-go-mod:
  frontend-node-modules:
