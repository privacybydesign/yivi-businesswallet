services:
  db:
    ports:
      - "5432:5432"

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    command:
      - tunnel
      - --no-autoupdate
      - --url=http://irma:8088
      # Expose the metrics API so dev-setup can read the assigned quick-tunnel URL
      # from http://localhost:2000/quicktunnel deterministically
      - --metrics=0.0.0.0:2000
    ports:
      - "2000:2000"
    depends_on:
      irma:
        condition: service_started

  irma:
    image: ghcr.io/privacybydesign/yivi:v1.0.0
    ports:
      - "8088:8088"
    command:
      - irma
      - server
      - --port=8088
      - --listen-addr=0.0.0.0
      - --url=${IRMA_CLIENT_URL:-http://localhost:8088}
      - --no-auth=true
      - --disclose-perms=${IRMA_EMAIL_ATTRIBUTE:-irma-demo.sidn-pbdf.email.email}
      - --disclose-perms=${IRMA_IDENTITY_GIVEN_NAMES_ATTRIBUTE:-irma-demo.MijnOverheid.drivinglicense.firstnames}
      - --disclose-perms=${IRMA_IDENTITY_FAMILY_NAME_ATTRIBUTE:-irma-demo.MijnOverheid.drivinglicense.familyname}

  backend:
    build:
      dockerfile: docker/development/Dockerfile
    healthcheck:
      start_period: 180s
      start_interval: 2s
    environment:
      IRMA_REQUESTOR_URL: ${IRMA_REQUESTOR_URL:-http://irma:8088}
      IRMA_REQUESTOR_TOKEN: ${IRMA_REQUESTOR_TOKEN:-}
      IRMA_EMAIL_ATTRIBUTE: ${IRMA_EMAIL_ATTRIBUTE:-irma-demo.sidn-pbdf.email.email}
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-admin@yivi.app}
    depends_on:
      seed:
        condition: service_completed_successfully
      irma:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod

  migrate:
    build:
      dockerfile: docker/development/Dockerfile
    entrypoint: [ "go", "run", "./cmd/migrate"]
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod

  seed:
    build:
      context: backend
      dockerfile: docker/development/Dockerfile
    entrypoint: ["go", "run", "./cmd/seed"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-yivi_business_wallet}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - backend-go-build:/root/.cache/go-build
      - backend-go-mod:/go/pkg/mod

  frontend:
    build:
      context: frontend
      dockerfile: src/docker/development/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # QERDS transport bench (AS4 / eDelivery). Opt-in — heavy and only needed when
  # exercising the real `domibus` provider driver instead of the in-process stub:
  #   docker compose --profile domibus up
  # then run the backend with QERDS_PROVIDER=domibus and
  # QERDS_PROVIDER_URL=http://domibus:8080/domibus/services/backend.
  # Admin console: http://localhost:8090/domibus (admin / 123456).
  # NOTE: proves AS4 plumbing, not qualified compliance — see .ai/features/qerds.md.
  domibus-mysql:
    image: fiware/domibus-mysql:latest
    # Published only for linux/amd64; runs under emulation on arm64 hosts.
    platform: linux/amd64
    profiles: ["domibus"]
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: domibus
      MYSQL_USER: edelivery
      MYSQL_PASSWORD: edelivery
    networks:
      # The Domibus Tomcat image resolves its datasource host as "mysql".
      default:
        aliases:
          - mysql

  domibus:
    image: fiware/domibus-tomcat:latest
    platform: linux/amd64
    profiles: ["domibus"]
    environment:
      # The image requires exactly "MySQL" or "Oracle" (case-sensitive).
      DB_TYPE: MySQL
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: domibus
      DB_USER: edelivery
      DB_PASS: edelivery
    ports:
      - "8090:8080"
    depends_on:
      - domibus-mysql

volumes:
  backend-go-build:
  backend-go-mod:
  frontend-node-modules:
